<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <title>F4Life</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link rel="stylesheet" href="../CSS/reset.css" />
  <link rel="stylesheet" href="../CSS/fale-conosco.css" />
  <link rel="stylesheet" href="imagens/font.css" />

  <script src="main.js" defer></script>
</head>

<body>
  <!-- Cabeçalho -->
  <header>
    <section class="topo">
      <img id="logo" src="../assets/Icon/f4life.png" alt="Logo da F4Life" />
      <h1 class="principal">Fale Conosco</h1>
    </section>
  </header>

  <!-- Conteúdo principal -->
  <main>
    <form id="form" class="form">
      <section class="caixa">
        <section class="form-control">
          <label for="nome">
            Quer ofertas exclusivas? Inscreva-se em nossa página!
          </label>
          <input type="text" id="nome" />
        </section>

        <section class="form-control">
          <label for="email">
            Deixe-nos o seu email para estar sempre atualizado.
          </label>
          <input type="email" id="email" placeholder="seuemail@dominio.com" />
        </section>

        <section class="form-control">
          <label for="telefone">Escreva seu número de telefone.</label>
          <input type="tel" id="telefone" placeholder="(XX) XXXXX-XXXX" />
        </section>

        <section class="form-control">
          <label for="mensagem">Deixe sua mensagem!!</label>
          <textarea id="mensagem" cols="30" rows="10"></textarea>
        </section>

        <input type="submit" value="Enviar" class="enviar" />
        <p id="mensagem-erro"></p>
      </section>
    </form>
  </main>

  <!-- Rodapé -->
  <footer>
    <section class="redes-sociais">

      <a href="https://web.whatsapp.com/" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
      </a>

      <a href="https://www.instagram.com/?hl=es" target="_blank">
        <i class="fa-brands fa-instagram"></i>
      </a>

      <a href="https://www.facebook.com/?locale=es_LA" target="_blank">
        <i class="fa-brands fa-facebook-f"></i>
      </a>

      <a href="https://www.linkedin.com/" target="_blank">
        <i class="fa-brands fa-linkedin-in"></i>
      </a>

    </section>

    <p>F4Life - 2022</p>
  </footer>
</body>

</html>
