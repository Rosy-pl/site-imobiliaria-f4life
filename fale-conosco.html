<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>F4Life</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="fale-conosco.css" />
    <link rel="stylesheet" href="imagens/font.css" />

    <script src="main.js" defer></script>
  </head>

  <body>
    <!-- Cabeçalho -->
    <header>
      <section class="topo">
        <img id="logo" src="assets/f4life.png" alt="Logo da F4Life" />
        <h1 class="principal">Fale Conosco</h1>
      </section>
    </header>

    <!-- Conteúdo principal -->
    <main>
      <form id="form" class="form">
        <section class="caixa">
          <section class="form-control">
            <label for="nome">
              Quer ofertas exclusivas? Inscreva-se em nossa página!
            </label>
            <input type="text" id="nome" />
          </section>

          <section class="form-control">
            <label for="email">
              Deixe-nos o seu email para estar sempre atualizado.
            </label>
            <input
              type="email"
              id="email"
              placeholder="seuemail@dominio.com"
            />
          </section>

          <section class="form-control">
            <label for="telefone">Escreva seu número de telefone.</label>
            <input
              type="tel"
              id="telefone"
              placeholder="(XX) XXXXX-XXXX"
            />
          </section>

          <section class="form-control">
            <label for="mensagem">Deixe sua mensagem!!</label>
            <textarea id="mensagem" cols="30" rows="10"></textarea>
          </section>

          <input type="submit" value="Enviar" class="enviar" />
          <p id="mensagem-erro"></p>
        </section>
      </form>
    </main>

    <!-- Rodapé -->
    <footer>
      <section class="redes">
        <a href="https://es-la.facebook.com/">
          <img class="icon" src="imagens/facebook.png" alt="Facebook" />
        </a>

        <a href="https://www.instagram.com/">
          <img class="icon" src="imagens/instagram.png" alt="Instagram" />
        </a>

        <a href="https://twitter.com/">
          <img class="icon" src="imagens/gorjeo.png" alt="Twitter" />
        </a>

        <a href="https://web.whatsapp.com/">
          <img class="icon" src="imagens/whatsapp.png" alt="WhatsApp" />
        </a>

        <a href="https://www.youtube.com/">
          <img class="icon" src="imagens/youtube.png" alt="YouTube" />
        </a>

        <a href="https://www.linkedin.com/">
          <img class="icon" src="imagens/linkedin.png" alt="LinkedIn" />
        </a>
      </section>

      <p>F4Life - 2022</p>
    </footer>
  </body>
</html>
